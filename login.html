<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Metadatos del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameCodes</title>
    
    <!-- Google Fonts: Orbitron & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Ícono de la pestaña del navegador (favicon) -->
    <link rel="icon" href="imagenes/iconos o logo/hackerman.ico">
    <!-- Hojas de estilo CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/registro.css">
</head>

<body>

    <!-- ============ CONTENIDO DEL LOGIN ============ -->
    <div class="pagina-registro">

        <!-- Formulario de login -->
        <!-- El ID "loginForm" se usa en JavaScript para capturar el evento submit -->
        <form id="loginForm" class="formulario-contenedor">
            <h3 class="formulario-titulo">Iniciar Sesión</h3>

            <!-- Campo: Email -->
            <input type="email" id="correoLogin" class="formulario-campo" placeholder="Correo electrónico" aria-label="Correo electrónico" required>
            <!-- Campo: Contraseña -->
            <input type="password" id="passwordLogin" class="formulario-campo" placeholder="Contraseña" aria-label="Contraseña" required>

            <button type="submit" class="formulario-boton">Ingresar</button>

            <!-- Contenedor donde se muestran los errores o éxito dinámicamente en pantalla -->
            <p id="mensajeLogin" class="formulario-mensaje"></p>

            <!-- Enlace para volver a la página principal -->
            <div class="formulario-enlace-volver">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </form>

    </div>

    <!-- Script de JavaScript para la validación del login -->
    <script src="js/login.js"></script>

</body>

</html>
